services:
  - type: web
    name: grantflow
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: LLM_PROVIDER
        value: openai # or azure, gemini, grok
      - key: OPENAI_API_KEY
        fromSecret: openai_api_key # Add this secret in Render dashboard
      # For Azure:
      # - key: AZURE_OPENAI_ENDPOINT
      #   fromSecret: azure_openai_endpoint
      # - key: AZURE_OPENAI_API_KEY
      #   fromSecret: azure_openai_api_key
      # - key: AZURE_OPENAI_CHAT_DEPLOYMENT
      #   fromSecret: azure_openai_chat_deployment
      # - key: AZURE_OPENAI_API_VERSION
      #   value: 2024-02-01
      # For Gemini:
      # - key: LLM_PROVIDER
      #   value: gemini
      # - key: GEMINI_API_KEY
      #   fromSecret: gemini_api_key
      # For Grok:
      # - key: LLM_PROVIDER
      #   value: grok
      # - key: GROK_API_KEY
      #   fromSecret: grok_api_key
